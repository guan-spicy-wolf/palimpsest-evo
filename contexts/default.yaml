# Context template for default role
# Defines what sections to include in the LLM context window

sections:
  - type: task_description
    description: "The task to be accomplished"

  - type: file_tree
    description: "Workspace file structure"
    max_files: 100
    exclude: [".git", "__pycache__", "*.pyc"]

  - type: recent_events
    description: "Recent system events for context"
    limit: 20
    format: "- [{ts}] {type}: {summary}"

  - type: version_history
    description: "Recent version changes"
    limit: 5
